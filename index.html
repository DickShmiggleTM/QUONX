<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUONX IDE</title>
  <style>
    body {
      background-color: #0d0d0d;
      color: #0f0;
      font-family: 'Courier New', monospace;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #root {
      width: 100vw;
      height: 100vh;
    }
    /* Custom scrollbar to match the theme */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #222;
    }
    ::-webkit-scrollbar-thumb {
      background-color: #00ff00;
      border: 2px solid #222;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
  {
    "imports": {
      "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
      "@google/genai": "https://aistudiocdn.com/@google/genai@^1.17.0",
      "react/": "https://aistudiocdn.com/react@^19.1.1/",
      "react": "https://aistudiocdn.com/react@^19.1.1",
      "@codemirror/state": "https://aistudiocdn.com/@codemirror/state@^6.4.1",
      "@codemirror/view": "https://aistudiocdn.com/@codemirror/view@^6.29.0",
      "@codemirror/language": "https://aistudiocdn.com/@codemirror/language@^6.10.2",
      "@codemirror/lang-javascript": "https://aistudiocdn.com/@codemirror/lang-javascript@^6.2.2",
      "@codemirror/lint": "https://aistudiocdn.com/@codemirror/lint@^6.8.1",
      "lezer-common": "https://aistudiocdn.com/lezer-common@^1.2.2",
      "@codemirror/commands": "https://aistudiocdn.com/@codemirror/commands@^6.6.0"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
